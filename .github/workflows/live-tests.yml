name: Live resolver tests

on:
  schedule:
    # Monday 06:00 UTC — surfaces broken scrapers once a week
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -v

      - name: Run live resolver smoke tests
        run: pytest -m live -v --tb=short
